<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MC 1.8.9 Texture Pack Creator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        .pixel-grid {
            image-rendering: pixelated;
            cursor: crosshair;
            background-image: 
                linear-gradient(45deg, #ccc 25%, transparent 25%), 
                linear-gradient(-45deg, #ccc 25%, transparent 25%), 
                linear-gradient(45deg, transparent 75%, #ccc 75%), 
                linear-gradient(-45deg, transparent 75%, #ccc 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
            background-color: white;
        }
        .active-tool {
            background-color: #3b82f6 !important;
            color: white;
        }
        .texture-item.active {
            border: 2px solid #3b82f6;
            background-color: #eff6ff;
        }
    </style>
</head>
<body class="bg-gray-100 h-screen flex flex-col font-sans">

    <!-- Header -->
    <header class="bg-slate-800 text-white p-4 flex justify-between items-center shadow-md">
        <h1 class="text-xl font-bold">MC 1.8.9 Texture Pack Creator</h1>
        <div class="space-x-2">
            <button onclick="document.getElementById('importZip').click()" class="bg-amber-600 hover:bg-amber-700 px-4 py-2 rounded text-sm transition">ZIPを読み込む</button>
            <input type="file" id="importZip" accept=".zip" class="hidden" onchange="importZipFile(event)">
            <button onclick="exportZipFile()" class="bg-green-600 hover:bg-green-700 px-4 py-2 rounded text-sm transition font-bold">ZIPを書き出す</button>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden">
        <!-- Sidebar: Texture List -->
        <aside class="w-72 bg-white border-r flex flex-col overflow-hidden">
            <div class="p-4 border-b space-y-3">
                <h2 class="font-bold text-gray-700">パック情報</h2>
                <input type="text" id="packName" placeholder="パック名" class="w-full border p-2 text-sm rounded" value="MyCustomPack">
                <textarea id="packDesc" placeholder="説明文" class="w-full border p-2 text-sm rounded h-16">Created with MC Texture Creator</textarea>
                <button onclick="addCustomTexture()" class="w-full bg-indigo-500 text-white p-2 rounded text-xs hover:bg-indigo-600">カスタムアイテムIDを追加</button>
            </div>
            <div id="textureList" class="flex-1 overflow-y-auto p-2 space-y-1 bg-gray-50">
                <!-- Textures will be listed here -->
            </div>
        </aside>

        <!-- Main Editor -->
        <section class="flex-1 flex flex-col bg-gray-200 relative">
            <div class="p-4 flex items-center justify-between bg-white border-b shadow-sm">
                <div class="flex items-center space-x-4">
                    <span id="currentPathDisplay" class="text-sm font-mono text-gray-600">assets/minecraft/textures/...</span>
                    <div class="flex border rounded overflow-hidden">
                        <button id="tool-pen" onclick="setTool('pen')" class="p-2 bg-gray-100 hover:bg-gray-200 active-tool" title="ペン">✏️</button>
                        <button id="tool-eraser" onclick="setTool('eraser')" class="p-2 bg-gray-100 hover:bg-gray-200" title="消しゴム">🧹</button>
                        <button id="tool-picker" onclick="setTool('picker')" class="p-2 bg-gray-100 hover:bg-gray-200" title="スポイト">🧪</button>
                    </div>
                    <button onclick="importFromOther()" class="text-xs bg-gray-200 hover:bg-gray-300 px-3 py-1 rounded">別のテクスチャから引用</button>
                </div>
                <div class="flex items-center space-x-2">
                    <span class="text-xs text-gray-500">Grid Size:</span>
                    <select id="gridSize" onchange="resizeCanvas()" class="text-sm border rounded">
                        <option value="16">16x16</option>
                        <option value="32">32x32</option>
                        <option value="64">64x64</option>
                        <option value="128">128x128</option>
                    </select>
                </div>
            </div>

            <div class="flex-1 flex items-center justify-center p-8">
                <div class="relative shadow-2xl bg-white p-2">
                    <canvas id="editorCanvas" class="pixel-grid border border-gray-400" width="512" height="512"></canvas>
                </div>
            </div>
        </section>

        <!-- Right Panel: Palette -->
        <aside class="w-64 bg-white border-l flex flex-col overflow-hidden">
            <div class="p-4 border-b">
                <h2 class="font-bold text-gray-700 mb-2">カラーパレット</h2>
                <div class="flex space-x-2 mb-4">
                    <input type="color" id="colorPicker" class="w-10 h-10 border rounded cursor-pointer">
                    <button onclick="addColor()" class="flex-1 bg-blue-500 text-white rounded text-sm hover:bg-blue-600">追加</button>
                </div>
                <div id="paletteGrid" class="grid grid-cols-5 gap-2 overflow-y-auto max-h-64">
                    <!-- Palette colors here -->
                </div>
            </div>
            <div class="p-4">
                <h2 class="font-bold text-gray-700 mb-2">プレビュー</h2>
                <div class="w-full aspect-square bg-gray-100 rounded border p-2 flex items-center justify-center">
                    <img id="previewImg" class="max-w-full max-h-full" style="image-rendering: pixelated;">
                </div>
            </div>
        </aside>
    </main>

    <!-- Modal for importing from other texture -->
    <div id="importModal" class="fixed inset-0 bg-black/50 flex items-center justify-center hidden z-50">
        <div class="bg-white rounded-lg p-6 w-96 max-h-[80vh] flex flex-col">
            <h3 class="font-bold mb-4">保存済みテクスチャから読み込む</h3>
            <div id="importList" class="flex-1 overflow-y-auto space-y-2 mb-4">
                <!-- List of existing textures -->
            </div>
            <button onclick="closeImportModal()" class="bg-gray-500 text-white p-2 rounded">キャンセル</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('editorCanvas');
        const ctx = canvas.getContext('2d');
        const previewImg = document.getElementById('previewImg');
        const paletteGrid = document.getElementById('paletteGrid');
        const textureListEl = document.getElementById('textureList');
        
        let currentSize = 16;
        let scale = 512 / currentSize;
        let selectedPath = "items/diamond_sword.png";
        let currentTool = 'pen';
        let isDrawing = false;
        let palette = ["#000000", "#ffffff", "#ff0000", "#00ff00", "#0000ff", "#ffff00", "#ff00ff", "#00ffff"];
        
        // Texture Storage (path -> ImageData or DataURL)
        const textureData = {};

        const defaultTextures = [
            "items/diamond_sword.png", "items/diamond_pickaxe.png", "items/diamond_axe.png", "items/diamond_shovel.png", "items/diamond_hoe.png",
            "items/diamond_helmet.png", "items/diamond_chestplate.png", "items/diamond_leggings.png", "items/diamond_boots.png",
            "items/iron_sword.png", "items/iron_pickaxe.png", "items/iron_axe.png", "items/iron_shovel.png", "items/iron_hoe.png",
            "items/iron_helmet.png", "items/iron_chestplate.png", "items/iron_leggings.png", "items/iron_boots.png",
            "items/stone_sword.png", "items/stone_pickaxe.png", "items/stone_axe.png", "items/stone_shovel.png", "items/stone_hoe.png",
            "items/golden_sword.png", "items/golden_pickaxe.png", "items/golden_axe.png", "items/golden_shovel.png", "items/golden_hoe.png",
            "items/golden_helmet.png", "items/golden_chestplate.png", "items/golden_leggings.png", "items/golden_boots.png", "items/golden_apple.png",
            "items/wooden_sword.png", "items/wooden_pickaxe.png", "items/wooden_axe.png", "items/wooden_shovel.png", "items/wooden_hoe.png",
            "items/bow_standby.png", "items/bow_pulling_0.png", "items/bow_pulling_1.png", "items/bow_pulling_2.png", "items/arrow.png",
            "items/fishing_rod.png", "items/flint_and_steel.png", "items/ender_pearl.png", "items/lava_bucket.png", "items/water_bucket.png",
            "items/potion_bottle_drinkable.png", "items/potion_bottle_splash.png", "items/glass_bottle.png", "items/apple.png", "items/cooked_beef.png",
            "items/bread.png", "items/mushroom_stew.png", "items/stick.png",
            "blocks/stone.png", "blocks/cobblestone.png", "blocks/obsidian.png",
            "blocks/planks_oak.png", "blocks/planks_spruce.png", "blocks/planks_birch.png", "blocks/planks_jungle.png", "blocks/planks_acacia.png", "blocks/planks_dark_oak.png",
            "blocks/wool_colored_white.png", "blocks/wool_colored_orange.png", "blocks/wool_colored_magenta.png", "blocks/wool_colored_light_blue.png",
            "blocks/wool_colored_yellow.png", "blocks/wool_colored_lime.png", "blocks/wool_colored_pink.png", "blocks/wool_colored_gray.png",
            "blocks/wool_colored_silver.png", "blocks/wool_colored_cyan.png", "blocks/wool_colored_purple.png", "blocks/wool_colored_blue.png",
            "blocks/wool_colored_brown.png", "blocks/wool_colored_green.png", "blocks/wool_colored_red.png", "blocks/wool_colored_black.png",
            "gui/icons.png", "gui/widgets.png", "misc/enchanted_item_glint.png"
        ];

        function init() {
            defaultTextures.forEach(path => {
                textureData[path] = createEmptyImage(16);
            });
            renderTextureList();
            renderPalette();
            loadTexture(selectedPath);
            resizeCanvas();
        }

        function createEmptyImage(size) {
            const canvasTmp = document.createElement('canvas');
            canvasTmp.width = size;
            canvasTmp.height = size;
            return canvasTmp.toDataURL();
        }

        function renderTextureList() {
            textureListEl.innerHTML = "";
            Object.keys(textureData).sort().forEach(path => {
                const div = document.createElement('div');
                div.className = `texture-item p-2 flex items-center space-x-2 cursor-pointer rounded hover:bg-gray-200 text-xs truncate ${selectedPath === path ? 'active' : ''}`;
                div.onclick = () => selectTexture(path);
                
                const preview = document.createElement('img');
                preview.src = textureData[path];
                preview.className = "w-6 h-6 border bg-white pixel-grid";
                
                const span = document.createElement('span');
                span.textContent = path;
                
                div.appendChild(preview);
                div.appendChild(span);
                textureListEl.appendChild(div);
            });
        }

        function selectTexture(path) {
            saveCurrentToData();
            selectedPath = path;
            document.getElementById('currentPathDisplay').textContent = "assets/minecraft/textures/" + path;
            loadTexture(path);
            renderTextureList();
        }

        function loadTexture(path) {
            const img = new Image();
            img.onload = () => {
                currentSize = img.width;
                document.getElementById('gridSize').value = currentSize;
                scale = 512 / currentSize;
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.imageSmoothingEnabled = false;
                ctx.drawImage(img, 0, 0, currentSize, currentSize, 0, 0, 512, 512);
                updatePreview();
            };
            img.src = textureData[path];
        }

        function saveCurrentToData() {
            const tmpCanvas = document.createElement('canvas');
            tmpCanvas.width = currentSize;
            tmpCanvas.height = currentSize;
            const tmpCtx = tmpCanvas.getContext('2d');
            tmpCtx.drawImage(canvas, 0, 0, 512, 512, 0, 0, currentSize, currentSize);
            textureData[selectedPath] = tmpCanvas.toDataURL();
        }

        function resizeCanvas() {
            const newSize = parseInt(document.getElementById('gridSize').value);
            // Before resizing, save what we have
            const oldData = canvas.toDataURL();
            currentSize = newSize;
            scale = 512 / currentSize;
            
            const img = new Image();
            img.onload = () => {
                ctx.clearRect(0, 0, 512, 512);
                ctx.imageSmoothingEnabled = false;
                ctx.drawImage(img, 0, 0, 512, 512);
                updatePreview();
            };
            img.src = oldData;
        }

        function updatePreview() {
            const tmpCanvas = document.createElement('canvas');
            tmpCanvas.width = currentSize;
            tmpCanvas.height = currentSize;
            const tmpCtx = tmpCanvas.getContext('2d');
            tmpCtx.drawImage(canvas, 0, 0, 512, 512, 0, 0, currentSize, currentSize);
            previewImg.src = tmpCanvas.toDataURL();
        }

        // Drawing Logic
        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        window.addEventListener('mouseup', stopDrawing);

        function startDrawing(e) {
            isDrawing = true;
            draw(e);
        }

        function stopDrawing() {
            isDrawing = false;
            saveCurrentToData();
            renderTextureList();
        }

        function draw(e) {
            if (!isDrawing && currentTool !== 'picker') return;
            const rect = canvas.getBoundingClientRect();
            const x = Math.floor((e.clientX - rect.left) / scale);
            const y = Math.floor((e.clientY - rect.top) / scale);

            if (currentTool === 'pen') {
                ctx.fillStyle = document.getElementById('colorPicker').value;
                ctx.fillRect(x * scale, y * scale, scale, scale);
            } else if (currentTool === 'eraser') {
                ctx.clearRect(x * scale, y * scale, scale, scale);
            } else if (currentTool === 'picker' && isDrawing) {
                const pixel = ctx.getImageData(x * scale + 1, y * scale + 1, 1, 1).data;
                if (pixel[3] > 0) {
                    const hex = "#" + ((1 << 24) + (pixel[0] << 16) + (pixel[1] << 8) + pixel[2]).toString(16).slice(1);
                    document.getElementById('colorPicker').value = hex;
                }
            }
            updatePreview();
        }

        function setTool(tool) {
            currentTool = tool;
            document.querySelectorAll('[id^="tool-"]').forEach(btn => btn.classList.remove('active-tool'));
            document.getElementById(`tool-${tool}`).classList.add('active-tool');
        }

        // Palette
        function renderPalette() {
            paletteGrid.innerHTML = "";
            palette.forEach((color, index) => {
                const btn = document.createElement('div');
                btn.className = "group relative w-full aspect-square rounded cursor-pointer border shadow-sm";
                btn.style.backgroundColor = color;
                btn.onclick = () => document.getElementById('colorPicker').value = color;
                
                const delBtn = document.createElement('button');
                delBtn.innerHTML = "×";
                delBtn.className = "absolute -top-1 -right-1 bg-red-500 text-white rounded-full w-4 h-4 text-[10px] hidden group-hover:block";
                delBtn.onclick = (e) => {
                    e.stopPropagation();
                    palette.splice(index, 1);
                    renderPalette();
                };
                
                btn.appendChild(delBtn);
                paletteGrid.appendChild(btn);
            });
        }

        function addColor() {
            const color = document.getElementById('colorPicker').value;
            if (!palette.includes(color)) {
                palette.push(color);
                renderPalette();
            }
        }

        // Custom Items
        function addCustomTexture() {
            const path = prompt("テクスチャのパスを入力してください (例: items/custom_ruby.png)");
            if (path) {
                if (!textureData[path]) {
                    textureData[path] = createEmptyImage(16);
                    renderTextureList();
                    selectTexture(path);
                } else {
                    alert("そのパスは既に存在します。");
                }
            }
        }

        // Import from others
        function importFromOther() {
            const modal = document.getElementById('importModal');
            const list = document.getElementById('importList');
            list.innerHTML = "";
            Object.keys(textureData).forEach(path => {
                const btn = document.createElement('button');
                btn.className = "w-full flex items-center p-2 hover:bg-gray-100 border rounded text-xs";
                btn.innerHTML = `<img src="${textureData[path]}" class="w-6 h-6 mr-2 border pixel-grid">${path}`;
                btn.onclick = () => {
                    textureData[selectedPath] = textureData[path];
                    loadTexture(selectedPath);
                    closeImportModal();
                };
                list.appendChild(btn);
            });
            modal.classList.remove('hidden');
        }

        function closeImportModal() {
            document.getElementById('importModal').classList.add('hidden');
        }

        // ZIP Export
        async function exportZipFile() {
            saveCurrentToData();
            const zip = new JSZip();
            const packName = document.getElementById('packName').value || "CustomPack";
            const packDesc = document.getElementById('packDesc').value || "A Minecraft Texture Pack";

            // pack.mcmeta
            const mcmeta = {
                pack: {
                    pack_format: 1,
                    description: packDesc
                }
            };
            zip.file("pack.mcmeta", JSON.stringify(mcmeta, null, 4));

            // Textures
            for (const path in textureData) {
                const base64 = textureData[path].split(',')[1];
                zip.file(`assets/minecraft/textures/${path}`, base64, {base64: true});
            }

            const content = await zip.generateAsync({type:"blob"});
            const link = document.createElement('a');
            link.href = URL.createObjectURL(content);
            link.download = `${packName}.zip`;
            link.click();
        }

        // ZIP Import
        async function importZipFile(event) {
            const file = event.target.files[0];
            if (!file) return;

            const zip = await JSZip.loadAsync(file);
            const loadedData = {};
            
            // Look for mcmeta
            const mcmetaFile = zip.file("pack.mcmeta");
            if (mcmetaFile) {
                const metaText = await mcmetaFile.async("string");
                try {
                    const meta = JSON.parse(metaText);
                    document.getElementById('packDesc').value = meta.pack.description;
                } catch(e) {}
            }

            // Find all textures in assets/minecraft/textures/
            const textureFolder = "assets/minecraft/textures/";
            const promises = [];

            zip.forEach((relPath, zipEntry) => {
                if (relPath.startsWith(textureFolder) && !zipEntry.dir && relPath.endsWith(".png")) {
                    const mcPath = relPath.replace(textureFolder, "");
                    const promise = zipEntry.async("base64").then(base64 => {
                        loadedData[mcPath] = "data:image/png;base64," + base64;
                    });
                    promises.push(promise);
                }
            });

            await Promise.all(promises);
            
            if (Object.keys(loadedData).length > 0) {
                // Clear and merge
                Object.assign(textureData, loadedData);
                renderTextureList();
                const firstPath = Object.keys(loadedData)[0];
                selectTexture(firstPath);
                alert("ZIPファイルの読み込みに成功しました。");
            } else {
                alert("有効なテクスチャが見つかりませんでした。パスを確認してください (assets/minecraft/textures/...)");
            }
        }

        init();
    </script>
</body>
</html>
