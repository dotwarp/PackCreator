<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft 1.8.9 Texture Studio Pro v4.6</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        .pixel-grid {
            display: grid;
            grid-template-columns: repeat(16, 1fr);
            gap: 1px;
            background-color: #333;
            border: 2px solid #555;
            aspect-ratio: 1 / 1;
            cursor: crosshair;
        }
        .pixel {
            background-color: transparent;
            width: 100%;
            height: 100%;
        }
        .pixel:hover {
            outline: 1px solid white;
            z-index: 10;
        }
        body {
            background-color: #121212;
            color: #e0e0e0;
        }
        .custom-scroll::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scroll::-webkit-scrollbar-track {
            background: #1a202c;
        }
        .custom-scroll::-webkit-scrollbar-thumb {
            background: #4a5568;
            border-radius: 3px;
        }
        .tool-active {
            background-color: #2563eb !important;
            border-color: #60a5fa !important;
        }
        .palette-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 4px;
        }
        .alpha-pattern {
            background-image: linear-gradient(45deg, #222 25%, transparent 25%), 
                              linear-gradient(-45deg, #222 25%, transparent 25%), 
                              linear-gradient(45deg, transparent 75%, #222 75%), 
                              linear-gradient(-45deg, transparent 75%, #222 75%);
            background-size: 10px 10px;
            background-position: 0 0, 0 5px, 5px -5px, -5px 0px;
            background-color: #111;
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-7xl mx-auto">
        <header class="mb-8 border-b border-gray-800 pb-4 flex justify-between items-end">
            <div>
                <h1 class="text-3xl font-bold text-green-400">MC 1.8.9 Texture Studio <span class="text-sm font-normal text-gray-500">v4.6 Custom Palette</span></h1>
                <p class="text-gray-400 text-sm">パレット追加機能を復活・強化</p>
            </div>
            <div class="text-right text-xs text-gray-500">
                16x16 Based Editor for Minecraft Java
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <!-- Left Sidebar -->
            <div class="lg:col-span-3 space-y-4">
                <section class="bg-gray-800 p-4 rounded-xl shadow-lg border border-gray-700">
                    <h2 class="text-sm font-bold mb-4 uppercase tracking-wider text-gray-400">パック設定</h2>
                    <div class="space-y-3">
                        <input type="text" id="packName" value="PvP_Ultimate_v4.6" class="w-full bg-gray-900 border border-gray-700 rounded p-2 text-sm focus:border-green-500 outline-none">
                        <textarea id="packDescription" class="w-full bg-gray-900 border border-gray-700 rounded p-2 text-sm h-14 focus:border-green-500 outline-none">Custom PvP & UI Textures</textarea>
                    </div>
                </section>

                <section class="bg-gray-800 p-4 rounded-xl shadow-lg border border-gray-700">
                    <h2 class="text-sm font-bold mb-2 uppercase tracking-wider text-blue-400">アイテム選択</h2>
                    <select id="categoryFilter" class="w-full bg-gray-900 border border-gray-700 rounded p-2 text-sm mb-3 outline-none">
                        <option value="all">すべて</option>
                        <option value="sword">武器</option>
                        <option value="tool">ツール</option>
                        <option value="ui">UI (インベントリ等)</option>
                        <option value="block">ブロック/木材</option>
                        <option value="glass">ガラス</option>
                        <option value="wool">羊毛</option>
                        <option value="effect">エフェクト/光</option>
                    </select>
                    <div class="grid grid-cols-1 gap-1 max-h-[350px] overflow-y-auto pr-2 custom-scroll" id="itemList"></div>
                </section>

                <div class="space-y-2">
                    <button id="exportBtn" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-xl transition-all shadow-lg">
                        ZIPを保存
                    </button>
                    <button id="importZipBtn" class="w-full bg-gray-700 hover:bg-gray-600 text-white font-bold py-3 rounded-xl transition-all border border-gray-600">
                        ZIPを読み込む
                    </button>
                    <input type="file" id="zipInput" accept=".zip" class="hidden">
                </div>
            </div>

            <!-- Main Editor -->
            <div class="lg:col-span-6 flex flex-col items-center">
                <div class="bg-gray-800 p-5 rounded-2xl shadow-2xl w-full border border-gray-700">
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <h3 class="text-xl font-bold text-white mb-1" id="currentItemDisplay">diamond_sword</h3>
                            <p class="text-[10px] text-gray-500 font-mono" id="currentPathDisplay">textures/items/diamond_sword.png</p>
                        </div>
                        <div class="flex gap-2">
                            <button id="resetToDefault" class="bg-blue-600 hover:bg-blue-500 text-[10px] font-bold px-3 py-1.5 rounded-lg transition">デフォルトに戻す</button>
                            <button id="clearCanvas" class="bg-red-600 hover:bg-red-500 text-[10px] font-bold px-3 py-1.5 rounded-lg transition">全消去</button>
                        </div>
                    </div>
                    
                    <div id="editorContainer" class="mb-6 flex justify-center bg-black/20 p-4 rounded-xl alpha-pattern">
                        <div id="pixelGrid" class="pixel-grid w-[400px] max-w-full"></div>
                    </div>

                    <div class="bg-gray-900 p-4 rounded-xl flex items-center justify-between">
                        <div class="flex items-center gap-4">
                            <div class="flex flex-col items-center gap-1">
                                <label class="text-[9px] text-gray-500 uppercase">Color</label>
                                <input type="color" id="colorPicker" value="#00ffff" class="w-10 h-10 bg-transparent cursor-pointer border-none p-0 overflow-hidden rounded">
                            </div>
                            <div class="flex flex-col items-center gap-1">
                                <label class="text-[9px] text-gray-500 uppercase">Opacity</label>
                                <input type="range" id="opacitySlider" min="0" max="100" value="100" class="w-20">
                            </div>
                            
                            <div class="flex gap-1">
                                <button id="penTool" class="tool-btn p-2 bg-gray-700 rounded border-2 border-transparent" title="ペン">P</button>
                                <button id="eraserTool" class="tool-btn p-2 bg-gray-700 rounded border-2 border-transparent" title="消しゴム">E</button>
                                <button id="pickerTool" class="tool-btn p-2 bg-gray-700 rounded border-2 border-transparent" title="スポイト">S</button>
                            </div>
                        </div>
                        <div class="flex items-center gap-3">
                            <button id="addToPaletteBtn" class="bg-green-600 hover:bg-green-500 text-white text-[10px] font-bold px-3 py-2 rounded-lg transition shrink-0">
                                ＋ パレットに追加
                            </button>
                            <div id="miniPreview" class="w-10 h-10 border border-gray-600 rounded bg-black/40" style="image-rendering: pixelated; background-size: cover;"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right Sidebar -->
            <div class="lg:col-span-3 space-y-4">
                <section class="bg-gray-800 p-4 rounded-xl border border-gray-700 shadow-lg">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-sm font-bold uppercase text-gray-400">パレット</h2>
                        <button id="clearPalette" class="text-[9px] text-red-400 hover:underline">初期化</button>
                    </div>
                    <div class="palette-grid" id="colorPalette"></div>
                </section>
                
                <section class="bg-gray-800 p-4 rounded-xl border border-gray-700 shadow-lg">
                    <h2 class="text-sm font-bold mb-2 uppercase text-gray-400">操作ガイド</h2>
                    <div class="text-xs space-y-2 text-gray-500">
                        <p><span class="text-green-400 font-bold">パレット追加:</span> 左下のボタンで現在選択中の色（不透明度含む）を保存できます。</p>
                        <p><span class="text-blue-400 font-bold">スポイト:</span> Sキーまたはボタンで、キャンバス上の色を抽出できます。</p>
                        <hr class="border-gray-700">
                        <div class="flex justify-between"><p>編集済アイテム</p><span id="statEdited" class="text-white">0</span></div>
                    </div>
                </section>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-6 right-6 bg-blue-600 text-white px-6 py-3 rounded-xl shadow-2xl opacity-0 transition-all pointer-events-none z-[200]"></div>

    <script>
        const COLORS = ['white', 'orange', 'magenta', 'light_blue', 'yellow', 'lime', 'pink', 'gray', 'silver', 'cyan', 'purple', 'blue', 'brown', 'green', 'red', 'black'];
        
        const DEFAULT_ITEMS = [
            { id: 'diamond_sword', path: 'items/diamond_sword', label: 'ダイヤの剣', cat: 'sword' },
            { id: 'iron_sword', path: 'items/iron_sword', label: '鉄の剣', cat: 'sword' },
            { id: 'end_stone', path: 'blocks/end_stone', label: 'エンドストーン', cat: 'block' },
            { id: 'glass', path: 'blocks/glass', label: '透明ガラス', cat: 'glass' },
            // UI
            { id: 'widgets', path: 'gui/widgets', label: 'ホットバー', cat: 'ui', default: 'gui_widgets' },
            { id: 'inventory', path: 'gui/container/inventory', label: 'インベントリ', cat: 'ui', default: 'gui_box' },
            { id: 'generic_54', path: 'gui/container/generic_54', label: '大チェスト', cat: 'ui', default: 'gui_box' },
            { id: 'furnace', path: 'gui/container/furnace', label: 'かまど', cat: 'ui', default: 'gui_box' },
            // Effects
            { id: 'particle_crit', path: 'particle/particles_crit', label: 'クリティカル', cat: 'effect' },
            { id: 'enchanted_item_glint', path: 'misc/enchanted_item_glint', label: 'エンチャント光', cat: 'effect' }
        ];

        const UI_TEMPLATES = {
            gui_widgets: (arr) => {
                for(let i=0; i<16; i++) { arr[i] = '#ffffff'; arr[240+i] = '#ffffff'; }
                for(let i=0; i<16; i++) { arr[i*16] = '#ffffff'; arr[i*16+15] = '#ffffff'; }
            },
            gui_box: (arr) => {
                for(let i=0; i<16; i++) { arr[i] = '#aaaaaa'; arr[240+i] = '#aaaaaa'; }
                for(let i=0; i<16; i++) { arr[i*16] = '#aaaaaa'; arr[i*16+15] = '#aaaaaa'; }
                for(let i=17; i<239; i++) { if(i%16!==0 && i%16!==15) arr[i] = 'rgba(0,0,0,0.5)'; }
            }
        };

        const INITIAL_PALETTE = ['#ff0000', '#00ff00', '#0000ff', '#ffff00', '#00ffff', '#ff00ff', '#ffffff', '#aaaaaa', '#000000', 'rgba(255,255,255,0.5)', 'rgba(0,0,0,0.5)', 'transparent'];

        let textures = {}; 
        let currentItem = DEFAULT_ITEMS[0];
        let isDrawing = false;
        let currentTool = 'pen';
        const GRID_SIZE = 16;
        let dynamicPalette = [...INITIAL_PALETTE];

        function init() {
            const grid = document.getElementById('pixelGrid');
            for (let i = 0; i < GRID_SIZE * GRID_SIZE; i++) {
                const pixel = document.createElement('div');
                pixel.classList.add('pixel');
                pixel.addEventListener('mousedown', (e) => {
                    if (currentTool === 'picker') eyeDropper(e.target);
                    else { isDrawing = true; applyTool(e.target); }
                });
                pixel.addEventListener('mouseover', (e) => { if (isDrawing && currentTool !== 'picker') applyTool(e.target); });
                grid.appendChild(pixel);
            }
            window.addEventListener('mouseup', () => { if(isDrawing) { isDrawing = false; save(); updatePreview(); } });

            DEFAULT_ITEMS.forEach(item => {
                textures[item.id] = new Array(GRID_SIZE * GRID_SIZE).fill('transparent');
            });
            
            document.getElementById('categoryFilter').onchange = renderItemList;
            document.getElementById('importZipBtn').onclick = () => document.getElementById('zipInput').click();
            document.getElementById('zipInput').onchange = handleZipImport;
            document.getElementById('penTool').onclick = () => { currentTool = 'pen'; updateToolUI(); };
            document.getElementById('eraserTool').onclick = () => { currentTool = 'eraser'; updateToolUI(); };
            document.getElementById('pickerTool').onclick = () => { currentTool = 'picker'; updateToolUI(); };
            document.getElementById('clearCanvas').onclick = () => { document.querySelectorAll('.pixel').forEach(p => p.style.backgroundColor = 'transparent'); save(); updatePreview(); };
            document.getElementById('resetToDefault').onclick = resetItemToDefault;
            document.getElementById('addToPaletteBtn').onclick = addCurrentColorToPalette;
            document.getElementById('clearPalette').onclick = () => { dynamicPalette = [...INITIAL_PALETTE]; renderPalette(); };

            // Keyboard shortcuts
            window.addEventListener('keydown', (e) => {
                if(e.key.toLowerCase() === 'p') { currentTool = 'pen'; updateToolUI(); }
                if(e.key.toLowerCase() === 'e') { currentTool = 'eraser'; updateToolUI(); }
                if(e.key.toLowerCase() === 's') { currentTool = 'picker'; updateToolUI(); }
            });

            renderPalette();
            renderItemList();
            switchItem(DEFAULT_ITEMS[0]);
            updateToolUI();
        }

        function addCurrentColorToPalette() {
            const color = document.getElementById('colorPicker').value;
            const opacity = document.getElementById('opacitySlider').value / 100;
            const r = parseInt(color.slice(1,3), 16), g = parseInt(color.slice(3,5), 16), b = parseInt(color.slice(5,7), 16);
            const rgba = opacity === 1 ? color : `rgba(${r}, ${g}, ${b}, ${opacity})`;
            
            if(!dynamicPalette.includes(rgba)) {
                dynamicPalette.push(rgba);
                // Keep max 24 colors for UI
                if(dynamicPalette.length > 24) dynamicPalette.shift();
                renderPalette();
                showToast("パレットに色を追加しました");
            }
        }

        function resetItemToDefault() {
            const newTex = new Array(GRID_SIZE * GRID_SIZE).fill('transparent');
            if(currentItem.default && UI_TEMPLATES[currentItem.default]) {
                UI_TEMPLATES[currentItem.default](newTex);
            }
            textures[currentItem.id] = newTex;
            const pixels = document.querySelectorAll('.pixel');
            pixels.forEach((px, i) => px.style.backgroundColor = newTex[i]);
            save();
            updatePreview();
            showToast("デフォルトにリセットしました");
        }

        function switchItem(item) {
            save();
            currentItem = item;
            document.getElementById('currentItemDisplay').innerText = item.label;
            document.getElementById('currentPathDisplay').innerText = `assets/minecraft/textures/${item.path}.png`;
            const data = textures[item.id];
            const pixels = document.querySelectorAll('.pixel');
            pixels.forEach((px, i) => px.style.backgroundColor = data[i]);
            updatePreview();
            renderItemList();
        }

        function save() {
            const pixels = document.querySelectorAll('.pixel');
            textures[currentItem.id] = Array.from(pixels).map(p => p.style.backgroundColor || 'transparent');
            updateStats();
        }

        function applyTool(pixelEl) {
            if (currentTool === 'pen') {
                const color = document.getElementById('colorPicker').value;
                const opacity = document.getElementById('opacitySlider').value / 100;
                const r = parseInt(color.slice(1,3), 16), g = parseInt(color.slice(3,5), 16), b = parseInt(color.slice(5,7), 16);
                pixelEl.style.backgroundColor = `rgba(${r}, ${g}, ${b}, ${opacity})`;
            } else if (currentTool === 'eraser') {
                pixelEl.style.backgroundColor = 'transparent';
            }
        }

        function eyeDropper(pixelEl) {
            const color = pixelEl.style.backgroundColor;
            if (color && color !== 'transparent') {
                const rgba = color.match(/[\d.]+/g);
                if(rgba.length >= 3) {
                    const hex = "#" + ((1 << 24) + (parseInt(rgba[0]) << 16) + (parseInt(rgba[1]) << 8) + parseInt(rgba[2])).toString(16).slice(1);
                    document.getElementById('colorPicker').value = hex;
                    document.getElementById('opacitySlider').value = rgba[3] ? Math.round(parseFloat(rgba[3]) * 100) : 100;
                }
            }
            currentTool = 'pen';
            updateToolUI();
        }

        function renderItemList() {
            const filter = document.getElementById('categoryFilter').value;
            const list = document.getElementById('itemList');
            list.innerHTML = '';
            DEFAULT_ITEMS.forEach(item => {
                if (filter !== 'all' && item.cat !== filter) return;
                const isEdited = textures[item.id].some(c => c !== 'transparent');
                const btn = document.createElement('button');
                btn.className = `w-full text-left px-3 py-2 rounded text-[11px] mb-1 flex justify-between items-center ${currentItem.id === item.id ? 'bg-blue-600 shadow-inner' : 'bg-gray-700 hover:bg-gray-600'}`;
                btn.innerHTML = `<span>${item.label}</span> ${isEdited ? '<span class="text-green-400">●</span>' : ''}`;
                btn.onclick = () => switchItem(item);
                list.appendChild(btn);
            });
        }

        function updatePreview() {
            const canvas = document.createElement('canvas');
            canvas.width = 16; canvas.height = 16;
            const ctx = canvas.getContext('2d');
            textures[currentItem.id].forEach((c, i) => { 
                if(c !== 'transparent') { ctx.fillStyle = c; ctx.fillRect(i % 16, Math.floor(i / 16), 1, 1); } 
            });
            document.getElementById('miniPreview').style.backgroundImage = `url(${canvas.toDataURL()})`;
        }

        function renderPalette() {
            const el = document.getElementById('colorPalette');
            el.innerHTML = '';
            dynamicPalette.forEach(c => {
                const btn = document.createElement('button');
                btn.className = "w-full aspect-square rounded border border-gray-700 hover:scale-110 transition-transform shadow-sm";
                if(c === 'transparent') {
                    btn.className += " alpha-pattern";
                } else {
                    btn.style.backgroundColor = c;
                }
                btn.onclick = () => { 
                    if(c === 'transparent') {
                        currentTool = 'eraser'; 
                    } else { 
                        // Parse color and opacity for the pickers
                        if(c.startsWith('rgba')) {
                            const match = c.match(/[\d.]+/g);
                            const hex = "#" + ((1 << 24) + (parseInt(match[0]) << 16) + (parseInt(match[1]) << 8) + parseInt(match[2])).toString(16).slice(1);
                            document.getElementById('colorPicker').value = hex;
                            document.getElementById('opacitySlider').value = Math.round(parseFloat(match[3]) * 100);
                        } else {
                            document.getElementById('colorPicker').value = c; 
                            document.getElementById('opacitySlider').value = 100;
                        }
                        currentTool = 'pen'; 
                    } 
                    updateToolUI(); 
                };
                el.appendChild(btn);
            });
        }

        function updateToolUI() {
            document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('tool-active'));
            if(currentTool === 'pen') document.getElementById('penTool').classList.add('tool-active');
            else if(currentTool === 'eraser') document.getElementById('eraserTool').classList.add('tool-active');
            else if(currentTool === 'picker') document.getElementById('pickerTool').classList.add('tool-active');
        }

        function updateStats() {
            document.getElementById('statEdited').innerText = Object.values(textures).filter(t => t.some(c => c !== 'transparent')).length;
        }

        async function handleZipImport(e) {
            const file = e.target.files[0];
            if (!file) return;
            try {
                const zip = await JSZip.loadAsync(file);
                for (const item of DEFAULT_ITEMS) {
                    const f = zip.file(`assets/minecraft/textures/${item.path}.png`);
                    if (f) {
                        const bitmap = await createImageBitmap(await f.async("blob"));
                        const cv = document.createElement('canvas'); cv.width=16; cv.height=16;
                        const cx = cv.getContext('2d'); cx.drawImage(bitmap, 0,0,16,16);
                        const d = cx.getImageData(0,0,16,16).data;
                        textures[item.id] = [];
                        for(let i=0; i<d.length; i+=4) {
                            textures[item.id].push(d[i+3] === 0 ? 'transparent' : `rgba(${d[i]},${d[i+1]},${d[i+2]},${d[i+3]/255})`);
                        }
                    }
                }
                switchItem(currentItem);
                showToast("ZIPから正常に読み込みました");
            } catch(err) { showToast("ZIP読み込み失敗"); }
        }

        document.getElementById('exportBtn').onclick = async () => {
            save();
            const zip = new JSZip();
            zip.file("pack.mcmeta", JSON.stringify({ pack: { pack_format: 1, description: document.getElementById('packDescription').value } }));
            for (const item of DEFAULT_ITEMS) {
                if(!textures[item.id].some(c => c !== 'transparent')) continue;
                
                const canvas = document.createElement('canvas'); canvas.width = 16; canvas.height = 16;
                const ctx = canvas.getContext('2d');
                textures[item.id].forEach((c, i) => { if(c !== 'transparent') { ctx.fillStyle = c; ctx.fillRect(i % 16, Math.floor(i / 16), 1, 1); } });
                zip.file(`assets/minecraft/textures/${item.path}.png`, await new Promise(r => canvas.toBlob(r)));
            }
            const b = await zip.generateAsync({ type: "blob" });
            const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = `${document.getElementById('packName').value}.zip`; a.click();
            showToast("ZIPをダウンロードしました");
        };

        function showToast(m) {
            const t = document.getElementById('toast'); t.innerText = m; t.style.opacity = '1';
            setTimeout(() => t.style.opacity = '0', 2000);
        }

        init();
    </script>
</body>
</html>
